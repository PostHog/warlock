name: 'Release'

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one release runs at a time. Prevents races when multiple PRs
# merge close together.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or update release PR / tag release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Required reviewers for this environment are configured in the repo
    # settings (Settings → Environments → Release): `@PostHog/team-docs-wizard`.
    # GitHub notifies reviewers in-product and by email when a publish is pending.
    environment: 'Release'
    permissions:
      contents: read
      id-token: write  # for npm OIDC trusted publishing + provenance
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # OIDC trusted publishing landed in npm 11.5.1 (Sep 2025). Node 22 ships
      # with npm 10.x, which silently falls back to token auth and fails with
      # ENEEDAUTH. Pin a known-good newer npm here.
      - name: Upgrade npm CLI (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@11.6.4

      # Use `npm publish` (not `pnpm publish`) – pnpm's publish wrapper doesn't
      # propagate the GitHub Actions OIDC token through to npm's trusted-
      # publisher exchange, which also surfaces as ENEEDAUTH.
      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: npm publish --access public --provenance
        env:
          # Load-bearing: setup-node with `registry-url` exports a placeholder
          # NODE_AUTH_TOKEN that npm would otherwise send as a bearer token,
          # blocking the OIDC flow. Clearing it lets trusted publishing kick in.
          NODE_AUTH_TOKEN: ''
